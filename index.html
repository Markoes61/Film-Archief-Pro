<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Mijn Archief - Mark Elings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-950 text-white p-8">

    <div class="max-w-2xl mx-auto text-center">
        <h1 class="text-5xl font-black text-orange-500 uppercase italic tracking-tighter mb-2">Mijn Archief</h1>
        <p class="text-fuchsia-400 text-2xl font-bold mb-10" style="font-family: 'Dancing Script', cursive;">Design By Mark Elings</p>
        
        <div id="db-indicator" class="mb-6 text-xs font-black uppercase tracking-widest text-red-500">
            Status: Verbinding maken...
        </div>

        <div class="bg-gray-900 p-6 rounded-3xl border border-gray-800 shadow-2xl mb-8">
            <input type="text" id="filmInvoer" placeholder="Filmnaam..." class="w-full bg-black border border-gray-800 rounded-xl p-4 mb-4 text-white outline-none focus:border-orange-500">
            <button id="voegToeBtn" class="w-full bg-orange-600 py-4 rounded-xl font-black uppercase tracking-widest hover:bg-orange-500">Toevoegen</button>
        </div>

        <div id="filmLijst" class="grid gap-4 text-left">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBBxBNyQ7AB5YS_WPFBpizhZmHW9zcbXV8",
            authDomain: "film-archief-pro.firebaseapp.com",
            projectId: "film-archief-pro",
            storageBucket: "film-archief-pro.firebasestorage.app",
            messagingSenderId: "743968676004",
            appId: "1:743968676004:web:940fa70df12ff54cd7ee31"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Check of we verbinding hebben
        if(db) {
            document.getElementById('db-indicator').innerText = "Status: Verbonden ✅";
            document.getElementById('db-indicator').classList.replace('text-red-500', 'text-green-500');
        }

        // Functie voor toevoegen
        document.getElementById('voegToeBtn').onclick = async () => {
            const titel = document.getElementById('filmInvoer').value;
            if(!titel) return;
            await addDoc(collection(db, "films"), {
                title: titel,
                rating: 7,
                createdAt: new Date().toISOString()
            });
            document.getElementById('filmInvoer').value = '';
        };

        // Live lijst ophalen
        const q = query(collection(db, "films"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const lijst = document.getElementById('filmLijst');
            lijst.innerHTML = '';
            snapshot.forEach((doc) => {
                const f = doc.data();
                lijst.innerHTML += `
                    <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 flex justify-between items-center">
                        <span class="font-bold">${f.title}</span>
                        <span class="text-orange-500 font-black">7</span>
                    </div>`;
            });
        });
    </script>
</body>
</html>
