<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Archief - Mark Elings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
        body { background-color: #030712; color: #f3f4f6; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="bg-gray-900 border-b-4 border-orange-500 shadow-2xl sticky top-0 z-40 backdrop-blur-md bg-opacity-95">
        <div class="max-w-5xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left flex items-center gap-4">
                <div>
                    <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-orange-600 tracking-tighter uppercase">Mijn Archief</h1>
                    <div class="flex items-center justify-center md:justify-start gap-2 mt-1">
                        <i data-lucide="clapperboard" class="text-orange-500 w-5 h-5"></i>
                        <p class="text-fuchsia-400 text-2xl font-bold" style="font-family: 'Dancing Script', cursive;">Design By Mark Elings</p>
                        <div class="ml-3 flex items-center gap-1.5 bg-black/40 px-2 py-0.5 rounded-full border border-white/5">
                            <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-red-600"></div>
                            <span id="status-text" class="text-[10px] font-black uppercase tracking-widest text-gray-400">Offline</span>
                        </div>
                    </div>
                </div>
            </div>
            <nav class="flex gap-2 bg-gray-950 p-1.5 rounded-2xl border border-gray-800">
                <button onclick="switchTab('archief')" id="btn-archief" class="tab-btn px-5 py-2 rounded-xl capitalize font-bold transition-all relative bg-orange-600 text-white shadow-lg">Archief</button>
                <button onclick="switchTab('kijkerstip')" id="btn-kijkerstip" class="tab-btn px-5 py-2 rounded-xl capitalize font-bold transition-all relative text-gray-500 hover:text-orange-400">Kijkerstip</button>
                <button onclick="switchTab('watchlist')" id="btn-watchlist" class="tab-btn px-5 py-2 rounded-xl capitalize font-bold transition-all relative text-gray-500 hover:text-orange-400">
                    Watchlist <span id="watchlist-count" class="hidden absolute -top-2 -right-2 bg-orange-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-gray-950">0</span>
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-8">
        
        <!-- ARCHIEF TAB -->
        <div id="tab-content-archief" class="tab-pane space-y-8 animate-fadeIn">
            <div class="bg-gray-900 p-5 rounded-3xl border border-gray-800 flex flex-col md:flex-row gap-4 items-center justify-between shadow-xl">
                <div class="flex flex-wrap gap-2">
                    <button onclick="fetchMissingInfo()" id="btn-fetch" class="bg-green-600 hover:bg-green-500 text-white px-5 py-3 rounded-2xl font-bold flex items-center gap-3 transition-all">
                        <i data-lucide="download" class="w-5 h-5"></i>
                        <span id="fetch-text">Titel Info</span>
                    </button>
                    <button onclick="copyBackup()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-3 rounded-2xl font-bold flex items-center gap-3 transition-all shadow-lg active:scale-95">
                        <i data-lucide="copy" class="w-5 h-5"></i>
                        <span>Backup Lijst</span>
                    </button>
                </div>
                <div class="relative w-full md:w-80">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 w-5 h-5"></i>
                    <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Zoek op titel of acteur..." class="w-full bg-gray-950 border border-gray-800 rounded-2xl pl-12 pr-5 py-3 focus:border-orange-500 outline-none transition-all">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-gray-900 p-8 rounded-3xl border border-gray-800 shadow-2xl relative">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-black text-orange-400 flex items-center gap-3 uppercase tracking-wider"><i data-lucide="plus" class="text-orange-500"></i> Invoeren</h2>
                        <button onclick="toggleBulk()" class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all bg-gray-800 text-gray-400 hover:bg-gray-700">
                            <i data-lucide="layers" class="w-3.5 h-3.5"></i> Bulk
                        </button>
                    </div>

                    <div class="space-y-4">
                        <div id="bulkSection" class="hidden animate-fadeIn space-y-3 p-4 bg-gray-950 rounded-2xl border border-orange-500/20 mb-4">
                            <textarea id="bulkInput" placeholder="Titel - 8.5&#10;Andere Film - 9" class="w-full h-32 bg-gray-900 border border-gray-800 rounded-xl p-3 outline-none focus:border-orange-500 resize-none font-mono text-xs text-gray-300"></textarea>
                            <button onclick="handleBulkAdd()" id="btn-bulk-import" class="w-full py-2.5 rounded-xl font-black bg-green-600 hover:bg-green-500 text-white transition-all uppercase tracking-widest text-xs">Importeer Lijst</button>
                        </div>

                        <div class="relative">
                            <input type="text" id="singleTitle" placeholder="Typ een titel..." class="w-full bg-gray-950 border border-gray-800 rounded-xl px-5 py-3 outline-none focus:border-orange-500">
                        </div>

                        <div class="flex gap-3">
                            <select id="singleType" class="flex-1 bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 outline-none border-orange-500/20 focus:border-orange-500">
                                <option value="film">Film</option>
                                <option value="serie">Serie</option>
                                <option value="docu">Documentaire</option>
                            </select>
                            <div class="flex items-center bg-gray-950 border border-gray-800 rounded-xl px-3">
                                <i data-lucide="star" class="text-orange-500 mr-2 w-4 h-4"></i>
                                <input type="number" id="singleRating" step="0.5" min="1" max="10" value="7" class="w-12 bg-transparent text-center font-bold outline-none">
                            </div>
                        </div>
                        <button onclick="handleSingleAdd()" class="w-full bg-orange-600 py-3 rounded-xl font-black hover:bg-orange-500 transition-all uppercase tracking-widest shadow-lg active:scale-95">Toevoegen</button>
                    </div>
                </div>

                <div class="hidden md:flex items-center justify-center p-8">
                    <div class="text-center opacity-20">
                        <i data-lucide="clapperboard" class="w-24 h-24 mx-auto mb-4"></i>
                        <p class="font-black italic uppercase tracking-[0.3em]">Het Archief</p>
                    </div>
                </div>
            </div>

            <div class="flex flex-wrap gap-3 justify-center">
                <button onclick="filterType('alle')" class="filter-btn px-8 py-2.5 rounded-2xl font-black transition-all border-2 uppercase text-xs tracking-widest bg-orange-600 border-orange-600 text-white shadow-xl">Alles</button>
                <button onclick="filterType('film')" class="filter-btn px-8 py-2.5 rounded-2xl font-black transition-all border-2 uppercase text-xs tracking-widest bg-gray-900 border-gray-800 text-gray-500 hover:text-orange-400">Films</button>
                <button onclick="filterType('serie')" class="filter-btn px-8 py-2.5 rounded-2xl font-black transition-all border-2 uppercase text-xs tracking-widest bg-gray-900 border-gray-800 text-gray-500 hover:text-orange-400">Series</button>
                <button onclick="filterType('docu')" class="filter-btn px-8 py-2.5 rounded-2xl font-black transition-all border-2 uppercase text-xs tracking-widest bg-gray-900 border-gray-800 text-gray-500 hover:text-orange-400">Docus</button>
            </div>

            <div class="bg-gray-900 rounded-[2.5rem] border border-gray-800 overflow-hidden shadow-2xl">
                <div id="archiveList" class="divide-y divide-gray-800"></div>
            </div>
        </div>

        <!-- KIJKERSTIP TAB -->
        <div id="tab-content-kijkerstip" class="tab-pane hidden max-w-4xl mx-auto space-y-8 animate-fadeIn">
            <div class="text-center space-y-4">
                <h2 class="text-5xl font-black text-white uppercase tracking-tighter">AI Kijkerstip</h2>
                <p class="text-gray-400 font-medium">Gebaseerd op jouw smaak uit het archief</p>
            </div>
            <div id="tip-container" class="min-h-[400px] flex items-center justify-center">
                <div class="text-gray-600 flex flex-col items-center gap-4">
                   <i data-lucide="sparkles" class="w-12 h-12 animate-pulse"></i>
                   <p>AI berekent jouw volgende favoriet...</p>
                </div>
            </div>
            <div class="flex justify-center">
                <button onclick="generateTip()" class="bg-gray-900 hover:bg-gray-800 text-orange-500 border border-orange-500/30 px-8 py-4 rounded-2xl font-black uppercase tracking-widest flex items-center gap-3 transition-all shadow-xl">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i> Nieuwe Suggestie
                </button>
            </div>
        </div>

        <!-- WATCHLIST TAB -->
        <div id="tab-content-watchlist" class="tab-pane hidden space-y-8 animate-fadeIn">
            <h2 class="text-3xl font-black text-white uppercase tracking-tighter text-center">Nog te kijken</h2>
            <div class="bg-gray-900 rounded-[2.5rem] border border-gray-800 overflow-hidden shadow-2xl">
                <div id="watchlistContent" class="divide-y divide-gray-800"></div>
            </div>
        </div>

    </main>

    <div id="toast" class="fixed top-6 right-6 z-50 pointer-events-none opacity-0 transition-all duration-300 transform translate-y-[-20px]">
        <div class="bg-orange-600 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold border border-orange-400">
            <span id="toast-msg"></span>
        </div>
    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js';
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, query, orderBy } from 'https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js';

        // FALLBACK CONFIG VOOR GITHUB
        const githubConfig = {
            apiKey: "AIzaSyBBxBNyQ7AB5YS_WPFBpizhZmHW9zcbXV8",
            authDomain: "film-archief-pro.firebaseapp.com",
            projectId: "film-archief-pro",
            storageBucket: "film-archief-pro.firebasestorage.app",
            messagingSenderId: "743968676004",
            appId: "1:743968676004:web:940fa70df12ff54cd7ee31"
        };

        // Gebruik omgevingsvariabelen indien beschikbaar, anders GitHub config
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : githubConfig;
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mijn-archief-app';
        const TMDB_KEY = '841d890eb7ff314099af4ad3430bb7d7';

        let user = null;
        let localArchive = [];
        let localWatchlist = [];
        let activeFilter = 'alle';
        let expandedId = null;

        // AUTH INITIALISATIE
        const initAuth = async () => {
            try {
                // Eerst proberen met de token van het platform
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    // Fallback naar anoniem (werkt op GitHub)
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error:", error);
                document.getElementById('status-text').innerText = 'Auth Error';
            }
        };

        onAuthStateChanged(auth, u => {
            if (u) {
                user = u;
                document.getElementById('status-dot').className = 'w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)] animate-pulse';
                document.getElementById('status-text').innerText = 'Online';
                setupListeners();
            } else {
                document.getElementById('status-dot').className = 'w-2.5 h-2.5 rounded-full bg-red-600';
                document.getElementById('status-text').innerText = 'Offline';
            }
        });

        initAuth();

        function setupListeners() {
            if (!user) return;
            
            // Archief Listener
            const archRef = collection(db, 'artifacts', appId, 'users', user.uid, 'archive');
            onSnapshot(archRef, snapshot => {
                localArchive = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                localArchive.sort((a,b) => b.rating - a.rating || new Date(b.createdAt) - new Date(a.createdAt));
                renderArchive();
            }, (error) => console.error("Archive Error:", error));

            // Watchlist Listener
            const watchRef = collection(db, 'artifacts', appId, 'users', user.uid, 'watchlist');
            onSnapshot(watchRef, snapshot => {
                localWatchlist = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                document.getElementById('watchlist-count').innerText = localWatchlist.length;
                document.getElementById('watchlist-count').classList.toggle('hidden', localWatchlist.length === 0);
                renderWatchlist();
            }, (error) => console.error("Watchlist Error:", error));
        }

        // --- UI FUNCTIES ---
        window.switchTab = (tabId) => {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
            document.getElementById(`tab-content-${tabId}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.className = "tab-btn px-5 py-2 rounded-xl capitalize font-bold transition-all relative text-gray-500 hover:text-orange-400";
            });
            document.getElementById(`btn-${tabId}`).className = "tab-btn px-5 py-2 rounded-xl capitalize font-bold transition-all relative bg-orange-600 text-white shadow-lg";
            if(tabId === 'kijkerstip') generateTip();
        };

        window.renderArchive = () => {
            const list = document.getElementById('archiveList');
            let filtered = localArchive;
            if(activeFilter !== 'alle') filtered = filtered.filter(i => i.type === activeFilter);
            
            const search = document.getElementById('searchInput').value.toLowerCase();
            if(search.length >= 2) {
                filtered = filtered.filter(i => 
                    (i.title || "").toLowerCase().includes(search) || 
                    (i.fetchedTitle || "").toLowerCase().includes(search) ||
                    (i.actors || "").toLowerCase().includes(search)
                );
            }

            list.innerHTML = filtered.map(item => `
                <div class="hover:bg-gray-800/30 transition-all group">
                    <div class="p-5 flex items-center justify-between cursor-pointer" onclick="toggleExpand('${item.id}')">
                        <div class="flex items-center gap-5">
                            <div class="w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xl shadow-inner ${item.rating >= 8 ? 'bg-green-500/10 text-green-500' : 'bg-orange-500/10 text-orange-500'}">${item.rating}</div>
                            <div>
                                <h3 class="font-black text-xl text-white group-hover:text-orange-400 transition-colors">${item.fetchedTitle || item.title}</h3>
                                <div class="flex items-center gap-3 mt-1 text-[10px] font-black uppercase tracking-tighter text-gray-500">
                                    <span class="bg-gray-950 px-2 py-0.5 rounded border border-gray-800 text-orange-500">${item.type}</span>
                                    ${item.releaseYear ? `<span>📅 ${item.releaseYear}</span>` : ''}
                                    ${item.tmdbRating ? `<span class="text-amber-500 flex items-center gap-0.5"><i data-lucide="globe" class="w-2.5 h-2.5"></i> TMDB: ${item.tmdbRating}</span>` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="event.stopPropagation(); deleteItem('${item.id}')" class="text-gray-600 hover:text-red-500 p-2 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                            <i data-lucide="chevron-down" class="w-6 h-6 transition-transform ${expandedId === item.id ? 'rotate-180 text-orange-500' : 'text-gray-600'}"></i>
                        </div>
                    </div>
                    ${expandedId === item.id ? `
                        <div class="px-6 pb-8 pt-2 bg-gray-950/50 animate-fadeIn flex flex-col md:flex-row gap-8">
                            <div class="w-full md:w-48 aspect-[2/3] bg-gray-900 rounded-3xl overflow-hidden border-2 border-gray-800 flex-shrink-0 shadow-lg">
                                ${item.poster ? `<img src="${item.poster}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-gray-800"><i data-lucide="film" class="w-10 h-10 opacity-20"></i></div>`}
                            </div>
                            <div class="flex-1 space-y-4">
                                <span class="text-orange-500 text-[10px] font-black uppercase tracking-[0.2em]">${item.genres || 'Genre Onbekend'}</span>
                                <h4 class="text-2xl font-black text-white">${item.fetchedTitle || item.title}</h4>
                                <p class="text-gray-400 text-sm leading-relaxed font-medium bg-gray-900/80 p-5 rounded-2xl border border-gray-800">${item.plot || "Geen details beschikbaar."}</p>
                                <div class="flex items-center gap-2">
                                    <i data-lucide="user" class="text-orange-500 w-4 h-4"></i>
                                    <span class="text-xs font-bold text-gray-500 italic">Met: ${item.actors || 'Onbekend'}</span>
                                </div>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `).join('');
            lucide.createIcons();
        };

        window.renderWatchlist = () => {
            const list = document.getElementById('watchlistContent');
            list.innerHTML = localWatchlist.map(item => `
                <div class="p-6 flex items-center justify-between group">
                    <div class="flex items-center gap-6">
                        <div class="w-16 h-24 bg-gray-800 rounded-xl overflow-hidden flex-shrink-0 border border-gray-700">
                             ${item.poster ? `<img src="${item.poster}" class="w-full h-full object-cover">` : `<i data-lucide="film" class="m-auto mt-8 opacity-20"></i>`}
                        </div>
                        <div>
                            <h3 class="text-xl font-black text-white group-hover:text-orange-500 transition-colors">${item.title}</h3>
                            <p class="text-gray-500 text-xs mt-1 font-bold uppercase tracking-widest">${item.mediaType || 'film'}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                         <button onclick="deleteWatchlist('${item.id}')" class="p-3 bg-gray-800 rounded-xl text-gray-500 hover:text-red-500 transition-all"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        window.handleSingleAdd = async () => {
            if (!user) return;
            const title = document.getElementById('singleTitle').value;
            const type = document.getElementById('singleType').value;
            const rating = parseFloat(document.getElementById('singleRating').value);
            if(!title) return;

            const docRef = await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'archive'), {
                title, type, rating, createdAt: new Date().toISOString(), infoFetched: false
            });
            document.getElementById('singleTitle').value = '';
            showToast("Toegevoegd!");
            
            const info = await fetchTMDB(title, type);
            if(info) await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'archive', docRef.id), info);
        };

        window.handleBulkAdd = async () => {
            if (!user) return;
            const input = document.getElementById('bulkInput').value;
            const lines = input.split('\n').filter(l => l.trim());
            document.getElementById('btn-bulk-import').disabled = true;

            for(let line of lines) {
                let rating = 7, title = line.trim();
                const parts = title.split(' - ');
                if(parts.length > 1 && !isNaN(parseFloat(parts[parts.length-1]))) {
                    rating = parseFloat(parts.pop());
                    title = parts.join(' - ');
                }
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'archive'), {
                    title, rating, type: 'film', infoFetched: false, createdAt: new Date().toISOString()
                });
            }
            document.getElementById('bulkInput').value = '';
            document.getElementById('bulkSection').classList.add('hidden');
            document.getElementById('btn-bulk-import').disabled = false;
            showToast(`${lines.length} titels toegevoegd!`);
        };

        async function fetchTMDB(title, type) {
            try {
                const sUrl = `https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}&language=nl-NL`;
                const sRes = await fetch(sUrl);
                const sData = await sRes.json();
                const best = sData.results?.[0];
                if(!best) return null;

                const mType = best.media_type === 'tv' ? 'tv' : 'movie';
                const dUrl = `https://api.themoviedb.org/3/${mType}/${best.id}?api_key=${TMDB_KEY}&language=nl-NL&append_to_response=credits`;
                const dRes = await fetch(dUrl);
                const d = await dRes.json();

                return {
                    tmdbId: best.id,
                    mediaType: mType,
                    plot: d.overview || "Geen beschrijving.",
                    actors: d.credits?.cast?.slice(0, 5).map(c => c.name).join(', ') || 'Onbekend',
                    poster: d.poster_path ? `https://image.tmdb.org/t/p/w500${d.poster_path}` : null,
                    releaseYear: (d.release_date || d.first_air_date || '').split('-')[0],
                    genres: d.genres?.map(g => g.name).join(', ') || '',
                    fetchedTitle: d.title || d.name,
                    tmdbRating: d.vote_average ? d.vote_average.toFixed(1) : null,
                    infoFetched: true
                };
            } catch(e) { return null; }
        }

        window.fetchMissingInfo = async () => {
            if (!user) return;
            const missing = localArchive.filter(i => !i.infoFetched);
            if(!missing.length) return showToast("Alles is bijgewerkt!");
            
            document.getElementById('btn-fetch').disabled = true;
            for(let i=0; i<missing.length; i++) {
                document.getElementById('fetch-text').innerText = `${i+1}/${missing.length}`;
                const info = await fetchTMDB(missing[i].title, missing[i].type);
                if(info) await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'archive', missing[i].id), info);
                await new Promise(r => setTimeout(r, 300));
            }
            document.getElementById('btn-fetch').disabled = false;
            document.getElementById('fetch-text').innerText = "Titel Info";
            showToast("Info bijgewerkt!");
        };

        window.deleteItem = async (id) => {
            if(confirm("Verwijderen uit archief?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'archive', id));
                showToast("Verwijderd.");
            }
        };

        window.deleteWatchlist = async (id) => {
             await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'watchlist', id));
             showToast("Verwijderd.");
        };

        window.addToWatchlist = async (item) => {
            await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'watchlist'), {
                ...item, addedAt: new Date().toISOString()
            });
            showToast("Watchlist bijgewerkt!");
            switchTab('watchlist');
        };

        window.copyBackup = () => {
            const text = localArchive.map(i => `${i.title} - ${i.rating}`).join('\n');
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("Lijst gekopieerd!");
        };

        window.handleSearch = () => renderArchive();
        window.toggleExpand = (id) => { expandedId = expandedId === id ? null : id; renderArchive(); };
        window.toggleBulk = () => document.getElementById('bulkSection').classList.toggle('hidden');

        window.filterType = (t) => {
            activeFilter = t;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.className = "filter-btn px-8 py-2.5 rounded-2xl font-black transition-all border-2 uppercase text-xs tracking-widest bg-gray-900 border-gray-800 text-gray-500 hover:text-orange-400";
            });
            event.target.className = "filter-btn px-8 py-2.5 rounded-2xl font-black transition-all border-2 uppercase text-xs tracking-widest bg-orange-600 border-orange-600 text-white shadow-xl";
            renderArchive();
        };

        window.generateTip = async () => {
            const container = document.getElementById('tip-container');
            container.innerHTML = `<div class="flex flex-col items-center gap-4 text-orange-500"><i data-lucide="refresh-cw" class="w-12 h-12 animate-spin"></i><p class="font-bold">AI Analyseert...</p></div>`;
            lucide.createIcons();

            const favs = localArchive.filter(i => i.rating >= 7).map(i => i.title).slice(0, 20).join(', ');
            const prompt = `Gezien deze lijst met favorieten: [${favs}], stel EEN nieuwe film of serie voor die hier perfect bij past. Geef antwoord in JSON: {"titel": "...", "waarom": "..."}`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                });
                const data = await res.json();
                const ai = JSON.parse(data.candidates[0].content.parts[0].text);
                const info = await fetchTMDB(ai.titel, 'film');

                if(info) {
                    container.innerHTML = `
                        <div class="bg-gray-900 border border-gray-800 rounded-[3rem] p-8 md:p-12 shadow-2xl flex flex-col md:flex-row gap-10 animate-fadeIn w-full">
                            <div class="w-full md:w-64 aspect-[2/3] rounded-3xl overflow-hidden shadow-2xl border-2 border-orange-500/20 flex-shrink-0">
                                <img src="${info.poster}" class="w-full h-full object-cover">
                            </div>
                            <div class="flex-1 space-y-6">
                                <div class="space-y-2">
                                    <span class="text-orange-500 font-black uppercase tracking-[0.3em] text-xs">Geselecteerd voor jou</span>
                                    <h3 class="text-4xl font-black text-white leading-none">${info.fetchedTitle}</h3>
                                </div>
                                <div class="bg-orange-500/5 border border-orange-500/10 p-6 rounded-3xl italic text-orange-200">
                                    "${ai.waarom}"
                                </div>
                                <p class="text-gray-400 line-clamp-3">${info.plot}</p>
                                <div class="flex gap-4 pt-4">
                                    <button onclick='addToWatchlist(${JSON.stringify(info).replace(/'/g, "&apos;")})' class="flex-1 bg-orange-600 hover:bg-orange-500 text-white py-4 rounded-2xl font-black uppercase tracking-widest transition-all shadow-lg active:scale-95">Watchlist</button>
                                </div>
                            </div>
                        </div>
                    `;
                }
            } catch(e) { 
                container.innerHTML = `<p class="text-red-500">AI even offline. Probeer het opnieuw!</p>`;
            }
            lucide.createIcons();
        };

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.className = "fixed top-6 right-6 z-50 transition-all duration-300 transform translate-y-0 opacity-100";
            setTimeout(() => {
                t.className = "fixed top-6 right-6 z-50 transition-all duration-300 transform translate-y-[-20px] opacity-0";
            }, 3000);
        };

    </script>
</body>
</html>
