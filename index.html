<script type="module">
  // We gebruiken hier de volledige HTTPS links zodat GitHub de bestanden kan vinden

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const { useState, useEffect, useMemo, useRef } = React;
        const { Trash2, ChevronDown, Search, Download, RefreshCw, Plus, Star, Film, ListVideo, Clapperboard, Sparkles, PlayCircle, Lightbulb, BookmarkPlus, Clock, User, ChevronUp, Copy, Layers, Loader2, Ban, Globe } = lucide;

        // JOUW FIREBASE CONFIGURATIE
        const firebaseConfig = {
          apiKey: "AIzaSyBBxBNyQ7AB5YS_WPFBpizhZmHW9zcbXV8",
          authDomain: "film-archief-pro.firebaseapp.com",
          projectId: "film-archief-pro",
          storageBucket: "film-archief-pro.firebasestorage.app",
          messagingSenderId: "743968676004",
          appId: "1:743968676004:web:940fa70df12ff54cd7ee31"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const TMDB_API_KEY = '841d890eb7ff314099af4ad3430bb7d7';
        const GEMINI_API_KEY = ""; // Hier kun je je Gemini Key later tussen de quotes plakken

        function App() {
            const [user, setUser] = useState(null);
            const [isOnline, setIsOnline] = useState(false);
            const [archive, setArchive] = useState([]);
            const [watchlist, setWatchlist] = useState([]);
            const [activeTab, setActiveTab] = useState('archief');
            const [archiveFilter, setArchiveFilter] = useState('alle');
            const [searchQuery, setSearchQuery] = useState('');
            const [singleTitle, setSingleTitle] = useState('');
            const [singleRating, setSingleRating] = useState('7');
            const [singleType, setSingleType] = useState('film');
            const [bulkInput, setBulkInput] = useState('');
            const [showBulkSection, setShowBulkSection] = useState(false);
            const [isAddingBulk, setIsAddingBulk] = useState(false);
            const [isFetchingAll, setIsFetchingAll] = useState(false);
            const [progress, setProgress] = useState({ current: 0, total: 0 });
            const [expandedId, setExpandedId] = useState(null);
            const [toast, setToast] = useState(null);
            const [suggestions, setSuggestions] = useState([]);
            const [showSuggestions, setShowSuggestions] = useState(false);

            useEffect(() => {
                signInAnonymously(auth).catch(() => setIsOnline(false));
                onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setIsOnline(!!u);
                });
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = query(collection(db, "films"), orderBy("createdAt", "desc"));
                return onSnapshot(q, (snapshot) => {
                    const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setArchive(items);
                });
            }, [user]);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            const fetchTMDBInfo = async (title, type) => {
                try {
                    const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(title)}&language=nl-NL`);
                    const data = await res.json();
                    if (!data.results?.length) return { notFound: true };
                    const match = data.results[0];
                    const detailsRes = await fetch(`https://api.themoviedb.org/3/${match.media_type}/${match.id}?api_key=${TMDB_API_KEY}&language=nl-NL&append_to_response=credits`);
                    const d = await detailsRes.json();
                    return {
                        poster: d.poster_path ? `https://image.tmdb.org/t/p/w500${d.poster_path}` : null,
                        plot: d.overview || "Geen beschrijving.",
                        releaseYear: (d.release_date || d.first_air_date || "").split('-')[0],
                        genres: d.genres?.map(g => g.name).join(', '),
                        actors: d.credits?.cast?.slice(0, 5).map(c => c.name).join(', '),
                        tmdbRating: d.vote_average?.toFixed(1),
                        fetchedTitle: d.title || d.name,
                        infoFetched: true
                    };
                } catch { return { notFound: true }; }
            };

            const handleSingleAdd = async () => {
                if (!singleTitle.trim()) return;
                const newDoc = await addDoc(collection(db, "films"), {
                    title: singleTitle,
                    rating: parseFloat(singleRating),
                    type: singleType,
                    createdAt: new Date().toISOString(),
                    infoFetched: false
                });
                setSingleTitle('');
                showToast("Toegevoegd!");
                const info = await fetchTMDBInfo(singleTitle, singleType);
                if (!info.notFound) await updateDoc(doc(db, "films", newDoc.id), info);
            };

            const removeFromArchive = async (id, e) => {
                e.stopPropagation();
                await deleteDoc(doc(db, "films", id));
                showToast("Verwijderd");
            };

            const filteredArchive = useMemo(() => {
                return archive.filter(i => 
                    (archiveFilter === 'alle' || i.type === archiveFilter) &&
                    (i.title.toLowerCase().includes(searchQuery.toLowerCase()))
                );
            }, [archive, archiveFilter, searchQuery]);

            return (
                <div className="min-h-screen bg-gray-950 text-gray-100 pb-24">
                    {toast && <div className="fixed top-6 right-6 z-50 bg-orange-600 px-6 py-3 rounded-2xl font-bold shadow-2xl">{toast}</div>}
                    
                    <header className="bg-gray-900 border-b-4 border-orange-500 p-6 sticky top-0 z-40">
                        <div className="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="text-center md:text-left">
                                <h1 className="text-4xl font-black text-orange-500 uppercase tracking-tighter">Mijn Archief</h1>
                                <p className="text-fuchsia-400 text-2xl font-bold" style={{fontFamily: 'Dancing Script'}}>Design By Mark Elings</p>
                                <div className="flex items-center gap-2 mt-1">
                                    <div className={`w-3 h-3 rounded-full ${isOnline ? 'bg-green-500 shadow-[0_0_8px_green]' : 'bg-red-500'}`}></div>
                                    <span className="text-xs uppercase font-black text-gray-500">{isOnline ? 'Database Verbonden ✅ JA' : 'Verbinding Verbroken ❌ NEE'}</span>
                                </div>
                            </div>
                            <nav className="flex gap-2 bg-black p-1.5 rounded-2xl border border-gray-800">
                                {['archief', 'watchlist'].map(t => (
                                    <button key={t} onClick={() => setActiveTab(t)} className={`px-6 py-2 rounded-xl font-bold capitalize ${activeTab === t ? 'bg-orange-600 text-white' : 'text-gray-500'}`}>{t}</button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto p-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            <div className="bg-gray-900 p-6 rounded-3xl border border-gray-800 shadow-xl">
                                <h2 className="text-orange-400 font-black mb-4 flex items-center gap-2 uppercase"><Plus/> Invoeren</h2>
                                <div className="space-y-3">
                                    <input type="text" placeholder="Titel van film..." value={singleTitle} onChange={e => setSingleTitle(e.target.value)} className="w-full bg-black border border-gray-800 rounded-xl p-3 outline-none focus:border-orange-500" />
                                    <div className="flex gap-2">
                                        <select value={singleType} onChange={e => setSingleType(e.target.value)} className="flex-1 bg-black border border-gray-800 rounded-xl p-3 outline-none">
                                            <option value="film">Film</option>
                                            <option value="serie">Serie</option>
                                            <option value="docu">Docu</option>
                                        </select>
                                        <input type="number" value={singleRating} onChange={e => setSingleRating(e.target.value)} className="w-20 bg-black border border-gray-800 rounded-xl p-3 text-center font-bold" />
                                    </div>
                                    <button onClick={handleSingleAdd} className="w-full bg-orange-600 py-3 rounded-xl font-black uppercase tracking-widest hover:bg-orange-500">Toevoegen</button>
                                </div>
                            </div>
                            <div className="hidden md:flex items-center justify-center opacity-10 uppercase font-black italic tracking-[0.5em]">De Collectie</div>
                        </div>

                        <div className="flex flex-wrap gap-2 mb-8 justify-center">
                            {['alle', 'film', 'serie', 'docu'].map(f => (
                                <button key={f} onClick={() => setArchiveFilter(f)} className={`px-6 py-2 rounded-xl font-black uppercase text-xs border-2 ${archiveFilter === f ? 'bg-orange-600 border-orange-600' : 'border-gray-800 text-gray-500'}`}>{f}</button>
                            ))}
                        </div>

                        <div className="bg-gray-900 rounded-[2rem] border border-gray-800 overflow-hidden shadow-2xl">
                            <div className="p-4 border-b border-gray-800 bg-black/20">
                                <div className="relative">
                                    <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-600" size={18} />
                                    <input type="text" placeholder="Zoek in je archief..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full bg-black border border-gray-800 rounded-xl py-3 pl-12 pr-4 outline-none focus:border-orange-500" />
                                </div>
                            </div>
                            <div className="divide-y divide-gray-800">
                                {filteredArchive.map(item => (
                                    <div key={item.id} className="group">
                                        <div className="p-4 flex items-center justify-between cursor-pointer hover:bg-gray-800/50" onClick={() => setExpandedId(expandedId === item.id ? null : item.id)}>
                                            <div className="flex items-center gap-4">
                                                <div className="w-10 h-10 rounded-lg bg-orange-500/10 text-orange-500 flex items-center justify-center font-black">{item.rating}</div>
                                                <div>
                                                    <h3 className="font-bold text-lg leading-tight">{item.fetchedTitle || item.title}</h3>
                                                    <span className="text-[10px] uppercase font-black text-gray-500 tracking-widest">{item.type} {item.releaseYear ? `• ${item.releaseYear}` : ''}</span>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <button onClick={(e) => removeFromArchive(item.id, e)} className="text-gray-700 hover:text-red-500 p-2"><Trash2 size={18}/></button>
                                                <ChevronDown size={20} className={`transition-transform ${expandedId === item.id ? 'rotate-180 text-orange-500' : 'text-gray-700'}`} />
                                            </div>
                                        </div>
                                        {expandedId === item.id && (
                                            <div className="p-6 bg-black/40 flex flex-col md:flex-row gap-6 animate-fadeIn">
                                                <img src={item.poster || 'https://via.placeholder.com/300x450?text=Geen+Poster'} className="w-32 md:w-40 rounded-2xl border border-gray-800 shadow-xl" />
                                                <div className="flex-1 space-y-3">
                                                    <p className="text-gray-400 text-sm leading-relaxed italic">{item.plot}</p>
                                                    <div className="text-xs text-gray-500 font-bold">Met: {item.actors || 'Onbekend'}</div>
                                                    {item.tmdbRating && <div className="inline-block bg-amber-500/10 text-amber-500 px-2 py-1 rounded-lg border border-amber-500/20 text-[10px] font-black">TMDB: {item.tmdbRating}</div>}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</body>
</html>
